  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background-color: #111111;
    transition: background-color 0.2s ease;
    position: relative;
  }
  #starfield, #cascade, #collage {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #starfield.active, #cascade.active, #collage.active {
    opacity: 1;
  }
  #cascade canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  #collage canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .star {
    position: absolute;
    left: 0;
    top: 0;
    background-color: #ffffff;
    -webkit-mask-image: var(--logo-mask);
    mask-image: var(--logo-mask);
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-size: contain;
    mask-size: contain;
    -webkit-mask-position: center;
    mask-position: center;
    aspect-ratio: 1833 / 673;
    will-change: transform, opacity;
  }
  #logo {
    position: absolute;
    left: 0;
    top: 0;
    width: 24vw;
    min-width: 260px;
    max-width: 400px;
    aspect-ratio: 1833 / 673;
    background-color: #ffffff;
    -webkit-mask-image: var(--logo-mask);
    mask-image: var(--logo-mask);
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-size: contain;
    mask-size: contain;
    -webkit-mask-position: center;
    mask-position: center;
    transition: background-color 0.2s ease, opacity 0.3s ease;
    z-index: 2;
  }
  #logo.hidden {
    opacity: 0;
  }
  @media (max-width: 767px) {
    #logo { width: 45vw; min-width: 160px; }
  }
  body.rainbow {
    background-image: linear-gradient(270deg, #ff0040, #ff8c00, #ffee00, #22c55e, #00b4ff, #7c3aed, #ff0040);
    background-size: 1400% 1400%;
    animation: rainbowShift 6s linear infinite;
  }
  #logo.rainbow {
    background-color: transparent;
    background-image: linear-gradient(270deg, #ff0040, #ff8c00, #ffee00, #22c55e, #00b4ff, #7c3aed, #ff0040);
    background-size: 1400% 1400%;
    animation: rainbowShift 3s linear infinite;
  }
  @keyframes rainbowShift {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  /* ---- nav overlay (sits on top of every screensaver mode) ---- */
  #nav {
    position: fixed;
    top: 28px;
    right: 32px;
    display: flex;

<script>
(function() {
  var combos = [
    { bg: '#111111', logo: '#ffffff' },
    { bg: '#ffffff', logo: '#111111' },
    { bg: '#0F6E56', logo: '#F0997B' },
    { bg: '#D85A30', logo: '#ffffff' },
    { bg: '#185FA5', logo: '#FAC775' },
    { bg: '#412402', logo: '#85B7EB' },
    { bg: '#4B1528', logo: '#5DCAA5' },
    { bg: '#ED93B1', logo: '#111111' },
    { bg: '#26215C', logo: '#FAEEDA' },
    { bg: '#0C447C', logo: '#ffffff' }
  ];

  var body = document.body;
  var logo = document.getElementById('logo');
  var starfield = document.getElementById('starfield');
  var cascade = document.getElementById('cascade');
  var collage = document.getElementById('collage');

  // ---- bounce state ----
  var x = 40, y = 40;
  var vx = 2.1, vy = 1.65;
  var comboIndex = 0;
  var mode = 'normal';

  function applyCombo(idx) {
    var c = combos[idx % combos.length];
    body.style.backgroundColor = c.bg;
    logo.style.backgroundColor = c.logo;
  }

  function step() {
    var maxX = window.innerWidth - logo.offsetWidth;
    var maxY = window.innerHeight - logo.offsetHeight;
    var bounced = false;

    x += vx;
    y += vy;

    if (x <= 0) { x = 0; vx = Math.abs(vx); bounced = true; }
    if (x >= maxX) { x = maxX; vx = -Math.abs(vx); bounced = true; }
    if (y <= 0) { y = 0; vy = Math.abs(vy); bounced = true; }
    if (y >= maxY) { y = maxY; vy = -Math.abs(vy); bounced = true; }

    if (bounced && mode === 'normal') {
      var nextIndex;
      do {
        nextIndex = Math.floor(Math.random() * combos.length);
      } while (nextIndex === comboIndex && combos.length > 1);
      comboIndex = nextIndex;
      applyCombo(comboIndex);
    }

    logo.style.left = x + 'px';
    logo.style.top = y + 'px';

    requestAnimationFrame(step);
  }

  window.addEventListener('resize', function() {
    var maxX = window.innerWidth - logo.offsetWidth;
    var maxY = window.innerHeight - logo.offsetHeight;
    x = Math.min(x, Math.max(0, maxX));
    y = Math.min(y, Math.max(0, maxY));
  });

  // ---- starfield (space mode) ----
  var STAR_COUNT = 55;
  var stars = [];

  function makeStar() {
    var el = document.createElement('div');
    el.className = 'star';
    starfield.appendChild(el);
    return { el: el, angle: Math.random() * Math.PI * 2, dist: Math.random() * 200, speed: 1.2 + Math.random() * 2.2 };
  }

  for (var i = 0; i < STAR_COUNT; i++) {
    stars.push(makeStar());
  }

  function stepStars() {
    var cx = window.innerWidth / 2;
    var cy = window.innerHeight / 2;
    var maxDist = Math.sqrt(cx * cx + cy * cy) + 60;

    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      s.dist += s.speed;
      if (s.dist > maxDist) {
        s.dist = 0;
        s.angle = Math.random() * Math.PI * 2;
        s.speed = 1.2 + Math.random() * 2.2;
      }
      var scale = 0.05 + (s.dist / maxDist) * 0.9;
      var size = 14 + scale * 40;
      var px = cx + Math.cos(s.angle) * s.dist;
      var py = cy + Math.sin(s.angle) * s.dist;
      s.el.style.width = size + 'px';
      s.el.style.opacity = Math.min(1, scale + 0.15);
      s.el.style.transform = 'translate(' + (px - size / 2) + 'px,' + (py - size / 2) + 'px)';
    }
  }

  function animate() {
    stepStars();
    requestAnimationFrame(animate);
  }

    logoTint.height = logoImg.naturalHeight;
    var tctx = logoTint.getContext('2d');
    tctx.drawImage(logoImg, 0, 0);
    tctx.globalCompositeOperation = 'source-in';
    tctx.fillStyle = '#ffffff';
    tctx.fillRect(0, 0, logoTint.width, logoTint.height);
    logoImgReady = true;
  };

  var LOGO_ASPECT = 1833 / 673;
  var balls = [];
  var cascadeSpawnAcc = 0;
  var SPAWN_INTERVAL = 220;
  var STAMP_INTERVAL = 40;
  var MAX_BALLS = 45;
  var GRAVITY = 0.32;
  var DAMPING = 0.68;

  function resizeCascadeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCascadeCanvas);
  resizeCascadeCanvas();

  function spawnBall() {
    var dir = Math.random() < 0.5 ? -1 : 1;
    var w = 55 + Math.random() * 25;
    balls.push({
      x: 40 + Math.random() * (canvas.width - 80),
      y: canvas.height * (0.08 + Math.random() * 0.28),
      vx: dir * (1.1 + Math.random() * 2.2),
      vy: -(2 + Math.random() * 5),
      w: w,
      h: w / LOGO_ASPECT,
      rot: 0,
      vrot: (Math.random() - 0.5) * 0.06,
      bounces: 0,
      stampAcc: STAMP_INTERVAL
    });
  }

  function stepCascade(dt) {
    if (!logoImgReady) return;

    cascadeSpawnAcc += dt;
    while (cascadeSpawnAcc >= SPAWN_INTERVAL && balls.length < MAX_BALLS) {
      spawnBall();
      cascadeSpawnAcc -= SPAWN_INTERVAL;
    }

    var groundY = canvas.height - 30;
    var frameScale = Math.min(2, dt / 16.67);

    for (var i = balls.length - 1; i >= 0; i--) {
      var b = balls[i];
      b.vy += GRAVITY * frameScale;
      b.x += b.vx * frameScale;
      b.y += b.vy * frameScale;
      b.rot += b.vrot * frameScale;
      b.stampAcc += dt;

      if (b.y >= groundY) {
        b.y = groundY;
        b.vy = -b.vy * DAMPING;
        b.vx *= 0.985;
        b.bounces += 1;
      }

      if (b.stampAcc >= STAMP_INTERVAL) {
        b.stampAcc = 0;
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.rot);
        ctx.drawImage(logoTint, -b.w / 2, -b.h / 2, b.w, b.h);
        ctx.restore();
      }

      if (b.x < -120 || b.x > canvas.width + 120 || (b.bounces > 7 && Math.abs(b.vy) < 1)) {
        balls.splice(i, 1);
      }
    }
  }

  var shapePoints = [];
  var collageActive = [];
  var collageSpawnAcc = 0;
  var COLLAGE_SPAWN_INTERVAL = 24;
  var COLLAGE_POP_DURATION = 160;

  function resizeCollageCanvas() {
    collageCanvasBlack.width = window.innerWidth;
    collageCanvasBlack.height = window.innerHeight;
    collageCanvasWhite.width = window.innerWidth;
    collageCanvasWhite.height = window.innerHeight;
    collageCanvasPreviewBlack.width = window.innerWidth;
    collageCanvasPreviewBlack.height = window.innerHeight;
    collageCanvasPreviewWhite.width = window.innerWidth;
    collageCanvasPreviewWhite.height = window.innerHeight;
    buildShapePoints();
  }
  window.addEventListener('resize', resizeCollageCanvas);
  resizeCollageCanvas();

  function buildShapePoints() {
    if (!collageLogoImgReady) { shapePoints = []; return; }
    var w = collageCanvasBlack.width * 0.58;
    var h = w / COLLAGE_LOGO_ASPECT;
    var left = (collageCanvasBlack.width - w) / 2;
    var top = (collageCanvasBlack.height - h) / 2;

    var shapeCanvas = document.createElement('canvas');
    shapeCanvas.width = collageCanvasBlack.width;
    shapeCanvas.height = collageCanvasBlack.height;
    var sctx = shapeCanvas.getContext('2d');
    sctx.drawImage(collageLogoImg, left, top, w, h);

    var data;
    try {
      data = sctx.getImageData(0, 0, shapeCanvas.width, shapeCanvas.height).data;
    } catch (e) {
      shapePoints = [];
      return;
    }

    var pts = [];
    var stride = 6;
    for (var py = 0; py < shapeCanvas.height; py += stride) {
      for (var px = 0; px < shapeCanvas.width; px += stride) {
        var idx = (py * shapeCanvas.width + px) * 4 + 3;
        if (data[idx] > 128) {
          pts.push({ x: px, y: py });
        }
      }
    }
    shapePoints = pts;
  }

  function easeOutBack(t) {
    var c1 = 1.4;
    var c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  function spawnCollageItem() {
    var wantWhite = Math.random() < 0.6 && shapePoints.length > 0;
    var size = 42 + Math.random() * 34;
    var x, y;

    if (wantWhite) {
      var pt = shapePoints[Math.floor(Math.random() * shapePoints.length)];
      x = pt.x + (Math.random() - 0.5) * 14;
      y = pt.y + (Math.random() - 0.5) * 14;
    } else {
      x = Math.random() * collageCanvasBlack.width;
      y = Math.random() * collageCanvasBlack.height;
    }

    collageActive.push({
      x: x, y: y, size: size,
      rot: (Math.random() - 0.5) * 0.5,
      white: wantWhite,
      age: 0
    });
  }

  function stepCollage(dt) {
    if (!collageLogoImgReady || !collageBlackTintReady) return;
    if (shapePoints.length === 0) buildShapePoints();

    collageSpawnAcc += dt;
    while (collageSpawnAcc >= COLLAGE_SPAWN_INTERVAL) {
      spawnCollageItem();
      collageSpawnAcc -= COLLAGE_SPAWN_INTERVAL;
    }

    collageCtxPreviewBlack.clearRect(0, 0, collageCanvasPreviewBlack.width, collageCanvasPreviewBlack.height);
    collageCtxPreviewWhite.clearRect(0, 0, collageCanvasPreviewWhite.width, collageCanvasPreviewWhite.height);

    for (var i = collageActive.length - 1; i >= 0; i--) {
      var item = collageActive[i];
      item.age += dt;
      var t = Math.min(1, item.age / COLLAGE_POP_DURATION);
      var scale = easeOutBack(t);
      var tint = item.white ? collageLogoTint : collageBlackTint;
      var targetCtx = item.white ? collageCtxWhite : collageCtxBlack;
      var previewCtx = item.white ? collageCtxPreviewWhite : collageCtxPreviewBlack;
      var w = item.size * scale;
      var h = w / COLLAGE_LOGO_ASPECT;

      if (t >= 1) {
        targetCtx.save();
        targetCtx.translate(item.x, item.y);
        targetCtx.rotate(item.rot);
        targetCtx.drawImage(tint, -item.size / 2, -(item.size / COLLAGE_LOGO_ASPECT) / 2, item.size, item.size / COLLAGE_LOGO_ASPECT);
        targetCtx.restore();
        collageActive.splice(i, 1);
      } else if (scale > 0) {
        previewCtx.save();
        previewCtx.translate(item.x, item.y);
        previewCtx.rotate(item.rot);
        previewCtx.drawImage(tint, -w / 2, -h / 2, w, h);
        previewCtx.restore();
      }
    }
  }

  var lastTime = Date.now();
  function animateAll() {
    var now = Date.now();
    var dt = now - lastTime;
    lastTime = now;
    if (mode === 'cascade') stepCascade(dt);
    if (mode === 'collage') stepCollage(dt);
    requestAnimationFrame(animateAll);
  }
  requestAnimationFrame(animateAll);

  // ---- mode switching: normal -> rainbow -> space -> cascade -> collage -> normal ... ----
  var modeOrder = ['normal', 'rainbow', 'space', 'cascade', 'collage'];

  function enterMode(next) {
    mode = next;
    body.classList.toggle('rainbow', mode === 'rainbow');
    logo.classList.toggle('rainbow', mode === 'rainbow');
    starfield.classList.toggle('active', mode === 'space');
    cascade.classList.toggle('active', mode === 'cascade');
    collage.classList.toggle('active', mode === 'collage');
    logo.classList.toggle('hidden', mode === 'cascade' || mode === 'collage');

    if (mode === 'normal') {
      applyCombo(comboIndex);
    } else if (mode === 'space') {
      body.style.backgroundColor = '#050505';
      logo.style.backgroundColor = '#ffffff';
    } else if (mode === 'cascade') {
      body.style.backgroundColor = '#050505';
      balls = [];
      cascadeSpawnAcc = 0;
      ctx.fillStyle = '#050505';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    } else if (mode === 'collage') {
      body.style.backgroundColor = '#050505';
      collageActive = [];
      collageSpawnAcc = 0;
      collageCtxBlack.fillStyle = '#050505';
      collageCtxBlack.fillRect(0, 0, collageCanvasBlack.width, collageCanvasBlack.height);
      collageCtxWhite.clearRect(0, 0, collageCanvasWhite.width, collageCanvasWhite.height);
      collageCtxPreviewBlack.clearRect(0, 0, collageCanvasPreviewBlack.width, collageCanvasPreviewBlack.height);
      collageCtxPreviewWhite.clearRect(0, 0, collageCanvasPreviewWhite.width, collageCanvasPreviewWhite.height);
      buildShapePoints();
    }
  }

  enterMode('normal');
  requestAnimationFrame(step);
  requestAnimationFrame(animate);

  // ---- secret code: cycles through the modes ----
  var secretCode = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','KeyB','KeyA','Enter'];
  var pressed = [];

  window.addEventListener('keydown', function(e) {
    var now = Date.now();
    pressed.push({ code: e.code, time: now });
    if (pressed.length > secretCode.length) {
      pressed.shift();
    }
    if (pressed.length === secretCode.length) {
      var matches = pressed.every(function(entry, i) { return entry.code === secretCode[i]; });
      var withinWindow = (now - pressed[0].time) <= 10000;
      if (matches && withinWindow) {
        var idx = modeOrder.indexOf(mode);
        var next = modeOrder[(idx + 1) % modeOrder.length];
        enterMode(next);
        pressed = [];
      }
    }
  });
})();
